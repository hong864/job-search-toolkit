<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호미 구직 자동화 툴킷 v2</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #18181f; --surface2: #22222c;
    --border: #2e2e3a; --accent: #7c6af7; --accent2: #a78bfa;
    --text: #e8e6f0; --muted: #8884a0;
    --green: #4ade80; --orange: #fb923c; --red: #f87171; --yellow: #facc15;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif; min-height: 100vh; }

  .header { padding: 18px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 17px; font-weight: 700; }
  .logo span { color: var(--accent2); }
  .badge { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; color: var(--muted); }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .stat-chip { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
  .chip-total { background: rgba(124,106,247,0.15); color: var(--accent2); border: 1px solid rgba(124,106,247,0.3); }
  .chip-interview { background: rgba(251,146,60,0.15); color: var(--orange); border: 1px solid rgba(251,146,60,0.3); }

  .tabs { display: flex; gap: 2px; padding: 14px 28px 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { padding: 9px 18px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); background: transparent; border: none; white-space: nowrap; transition: all 0.2s; position: relative; bottom: -1px; font-family: inherit; }
  .tab.active { color: var(--text); background: var(--surface); border: 1px solid var(--border); border-bottom-color: var(--surface); }

  .panel { display: none; padding: 24px 28px; }
  .panel.active { display: block; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } .tabs, .header, .panel { padding-left: 14px; padding-right: 14px; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; margin-top: 12px; }
  label:first-of-type { margin-top: 0; }
  textarea, input[type=text], input[type=date], select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-family: inherit; font-size: 13px;
    padding: 9px 11px; resize: vertical; outline: none; transition: border-color 0.2s;
  }
  textarea { min-height: 100px; }
  textarea:focus, input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.3); padding: 5px 10px; font-size: 11px; }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .mt { margin-top: 12px; }

  .output-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 14px; font-size: 12px; line-height: 1.7; white-space: pre-wrap; min-height: 80px; color: var(--text); max-height: 380px; overflow-y: auto; }
  .placeholder { color: var(--muted); font-style: italic; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* DB 리스트 */
  .db-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .db-filter { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 10px; font-family: inherit; cursor: pointer; }
  .db-filter:focus { outline: none; border-color: var(--accent); }
  .search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 10px; font-family: inherit; flex: 1; min-width: 120px; }
  .search-input:focus { outline: none; border-color: var(--accent); }

  .record-list { display: flex; flex-direction: column; gap: 8px; }
  .record-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: border-color 0.2s; }
  .record-card:hover { border-color: var(--accent); }
  .record-card.expanded { border-color: var(--accent); }
  .record-header { display: flex; align-items: center; gap: 8px; }
  .record-company { font-size: 14px; font-weight: 600; }
  .record-position { font-size: 12px; color: var(--muted); }
  .record-meta { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .stage-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .stage-관심 { background: rgba(136,132,160,0.2); color: var(--muted); }
  .stage-지원완료 { background: rgba(96,165,250,0.2); color: #60a5fa; }
  .stage-서류통과 { background: rgba(250,204,21,0.2); color: var(--yellow); }
  .stage-1차면접 { background: rgba(251,146,60,0.2); color: var(--orange); }
  .stage-2차면접 { background: rgba(251,146,60,0.2); color: var(--orange); }
  .stage-최종면접 { background: rgba(167,139,250,0.2); color: var(--accent2); }
  .stage-합격 { background: rgba(74,222,128,0.2); color: var(--green); }
  .stage-불합격 { background: rgba(248,113,113,0.2); color: var(--red); }
  .stage-보류 { background: rgba(136,132,160,0.2); color: var(--muted); }
  .priority-s { color: var(--red); font-weight: 700; font-size: 11px; }
  .priority-a { color: var(--orange); font-weight: 700; font-size: 11px; }
  .priority-b { color: var(--yellow); font-weight: 700; font-size: 11px; }
  .priority-c { color: var(--muted); font-weight: 700; font-size: 11px; }

  .record-body { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .record-body.show { display: block; }
  .detail-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .detail-label { color: var(--muted); min-width: 64px; }
  .detail-value { color: var(--text); }
  .saved-content { background: var(--surface2); border-radius: 6px; padding: 10px 12px; font-size: 11px; line-height: 1.6; white-space: pre-wrap; margin-top: 8px; max-height: 200px; overflow-y: auto; color: var(--text); }
  .record-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

  /* 파이프라인 보드 */
  .pipeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-x: auto; }
  @media (max-width: 700px) { .pipeline { grid-template-columns: repeat(2, 1fr); } }
  .pipe-col { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; min-height: 120px; }
  .pipe-col-title { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
  .pipe-count { font-size: 16px; font-weight: 700; color: var(--text); }
  .pipe-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
  .pipe-item-company { font-weight: 600; }
  .pipe-item-position { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* 탭 아이콘 */
  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* 편집 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">호미 <span>구직 DB</span></div>
  <div class="badge" id="d-day-badge">D-17 · 계약종료 7/18</div>
  <div class="header-right">
    <span class="stat-chip chip-total" id="stat-total">전체 0건</span>
    <span class="stat-chip chip-interview" id="stat-interview">면접 0건</span>
    <button class="btn btn-secondary" style="padding:5px 12px;font-size:11px" id="sync-btn" onclick="syncToNotion()">🔄 Notion 동기화</button>
    <span id="sync-status" style="font-size:11px;color:var(--muted)"></span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('db')">📋 지원 DB</button>
  <button class="tab" onclick="switchTab('pipeline')">🗂 파이프라인</button>
  <button class="tab" onclick="switchTab('resume')">📄 이력서 생성</button>
  <button class="tab" onclick="switchTab('interview')">🎯 면접 준비</button>
</div>

<!-- 탭1: 지원 DB -->
<div id="tab-db" class="panel active">
  <div style="display:flex; gap:10px; align-items:flex-start; flex-wrap:wrap;">
    <div style="flex:1; min-width:260px;">
      <div class="section-title">지원 현황 DB</div>
      <div class="db-toolbar">
        <input class="search-input" placeholder="🔍 회사명 검색..." oninput="renderList()" id="search-input">
        <select class="db-filter" onchange="renderList()" id="filter-stage">
          <option value="">전체 단계</option>
          <option>관심</option><option>지원완료</option><option>서류통과</option>
          <option>1차면접</option><option>2차면접</option><option>최종면접</option>
          <option>합격</option><option>불합격</option><option>보류</option>
        </select>
        <select class="db-filter" onchange="renderList()" id="filter-priority">
          <option value="">전체 우선순위</option>
          <option>S</option><option>A</option><option>B</option><option>C</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ 추가</button>
      </div>
      <div class="record-list" id="record-list">
        <div class="empty-state"><div class="empty-icon">📭</div>저장된 지원 내역이 없습니다.<br>우측 폼 또는 상단 + 버튼으로 추가하세요.</div>
      </div>
    </div>
    <div style="width:280px; flex-shrink:0;">
      <div class="card">
        <div class="card-title">빠른 추가</div>
        <label>회사명</label>
        <input type="text" id="q-company" placeholder="예: 무신사">
        <label>포지션</label>
        <input type="text" id="q-position" placeholder="예: 서비스기획 PO">
        <label>단계</label>
        <select id="q-stage">
          <option>관심</option><option selected>지원완료</option><option>서류통과</option>
          <option>1차면접</option><option>2차면접</option><option>최종면접</option>
          <option>합격</option><option>불합격</option><option>보류</option>
        </select>
        <label>우선순위</label>
        <select id="q-priority"><option>S</option><option selected>A</option><option>B</option><option>C</option></select>
        <label>지원경로</label>
        <select id="q-channel">
          <option>원티드</option><option>잡코리아</option><option>사람인</option>
          <option>링크드인</option><option>리멤버</option><option>헤드헌터</option><option>직접지원</option>
        </select>
        <label>지원일</label>
        <input type="date" id="q-date">
        <label>메모</label>
        <textarea id="q-memo" placeholder="연봉, 담당자, 특이사항 등" style="min-height:60px"></textarea>
        <button class="btn btn-primary mt" style="width:100%" onclick="quickAdd()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 탭2: 파이프라인 -->
<div id="tab-pipeline" class="panel">
  <div class="section-title">파이프라인 보드</div>
  <div class="pipeline" id="pipeline-board"></div>
</div>

<!-- 탭3: 이력서 생성 -->
<div id="tab-resume" class="panel">
  <div class="section-title">이력서 · 커버레터 커스터마이징</div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">입력</div>
      <label>지원 대상 (DB에서 선택 또는 직접 입력)</label>
      <select id="r-select" onchange="fillFromDB('r')">
        <option value="">직접 입력</option>
      </select>
      <label>회사명 · 포지션</label>
      <input type="text" id="r-company" placeholder="예: 코그콤 · 서비스기획 PM">
      <label>JD 핵심 요구사항</label>
      <textarea id="r-jd" placeholder="공고 붙여넣기 또는 키워드 입력&#10;예: AI 서비스기획, GA4/GTM, 이커머스 UX..."></textarea>
      <label>이력서 베이스</label>
      <select id="r-base">
        <option value="A">A — 서비스기획/PO (이커머스 23년)</option>
        <option value="B">B — GTM/데이터 애널리틱스</option>
        <option value="C">C — 프리랜서 컨설턴트</option>
      </select>
      <label>강조사항 (선택)</label>
      <input type="text" id="r-extra" placeholder="예: AI 도입 경험, 멀티브랜드 운영">
      <div style="display:flex; gap:8px; margin-top:12px;">
        <button class="btn btn-primary" id="r-btn" onclick="generateResume()" style="flex:1">✨ 생성</button>
        <button class="btn btn-secondary" id="r-save-btn" onclick="saveResumeResult()" style="display:none">💾 DB저장</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">결과 <button class="btn btn-secondary btn-sm" onclick="copyEl('r-output')">복사</button></div>
      <div class="output-box" id="r-output"><span class="placeholder">생성 버튼을 누르세요.</span></div>
    </div>
  </div>
</div>

<!-- 탭4: 면접 준비 -->
<div id="tab-interview" class="panel">
  <div class="section-title">면접 준비 질문 생성</div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">입력</div>
      <label>지원 대상 (DB에서 선택)</label>
      <select id="i-select" onchange="fillFromDB('i')">
        <option value="">직접 입력</option>
      </select>
      <label>회사명 · 포지션</label>
      <input type="text" id="i-company" placeholder="예: 코그콤 · 서비스기획 PM">
      <label>회사 특징</label>
      <textarea id="i-info" placeholder="사업 방향, 최근 이슈 등" style="min-height:70px"></textarea>
      <label>면접 유형</label>
      <select id="i-type">
        <option value="first">1차 (인사/문화)</option>
        <option value="second">2차 (직무 심층)</option>
        <option value="final">최종 (임원)</option>
      </select>
      <label>특별 준비 (선택)</label>
      <input type="text" id="i-focus" placeholder="예: 연봉 협상, AI 경험 강조, 이직 횟수 대응">
      <div style="display:flex; gap:8px; margin-top:12px;">
        <button class="btn btn-primary" id="i-btn" onclick="generateInterview()" style="flex:1">🎯 생성</button>
        <button class="btn btn-secondary" id="i-save-btn" onclick="saveInterviewResult()" style="display:none">💾 DB저장</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">예상 질문 <button class="btn btn-secondary btn-sm" onclick="copyEl('i-output')">복사</button></div>
      <div class="output-box" id="i-output"><span class="placeholder">생성 버튼을 누르세요.</span></div>
    </div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">지원 내역 추가</div>
    <label>회사명</label>
    <input type="text" id="m-company" placeholder="회사명">
    <label>포지션</label>
    <input type="text" id="m-position" placeholder="서비스기획 PO">
    <label>단계</label>
    <select id="m-stage">
      <option>관심</option><option>지원완료</option><option>서류통과</option>
      <option>1차면접</option><option>2차면접</option><option>최종면접</option>
      <option>합격</option><option>불합격</option><option>보류</option>
    </select>
    <label>우선순위</label>
    <select id="m-priority"><option>S</option><option>A</option><option>B</option><option>C</option></select>
    <label>지원경로</label>
    <select id="m-channel">
      <option>원티드</option><option>잡코리아</option><option>사람인</option>
      <option>링크드인</option><option>리멤버</option><option>헤드헌터</option><option>직접지원</option>
    </select>
    <label>지원일</label>
    <input type="date" id="m-date">
    <label>면접일</label>
    <input type="date" id="m-interview-date">
    <label>담당자</label>
    <input type="text" id="m-contact" placeholder="예: 김나래 매니저">
    <label>메모</label>
    <textarea id="m-memo" placeholder="연봉, 특이사항 등"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'job_db_records';
const RESUME_KEY = 'job_db_resume_';
const INTERVIEW_KEY = 'job_db_interview_';
let records = [];
let editingId = null;

const PROFILE = `홍태원 (호미) — 서비스기획 PO, 23년 경력 (패션 이커머스 전문)
주요 역량: PDP/PLP UX 기획, GTM/GA4 구축, 멀티브랜드 플랫폼 운영, AI 자동화
주요 경력:
- 시선인터내셔널(프리랜서): sisun.com 5개 브랜드 PDP 리뉴얼, GTM/GA4 구축, 온라인 협의체 운영
- 오감스튜디오(10년): Converse Korea, The North Face O2O, 롯데렌터카, 삼성물산 브랜드 서비스기획 PM
- AI 역량: Claude Code 활용, Notion 자동화, GA4/GTM 구축, 데이터 기반 전환 최적화`;

// ── Storage 헬퍼 ──────────────────────────────────────
async function loadRecords() {
  try {
    const res = await window.storage.get(STORAGE_KEY);
    records = res ? JSON.parse(res.value) : [];
  } catch { records = []; }
}

async function saveRecords() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(records));
  } catch(e) { showToast('저장 실패: ' + e.message); }
}

async function saveExtra(key, value) {
  try { await window.storage.set(key, value); } catch {}
}

async function loadExtra(key) {
  try { const r = await window.storage.get(key); return r ? r.value : null; } catch { return null; }
}

    const matchSearch = !search || r.company.toLowerCase().includes(search) || (r.position||'').toLowerCase().includes(search);
    const matchStage = !stage || r.stage === stage;
    const matchPriority = !priority || r.priority === priority;
    return matchSearch && matchStage && matchPriority;
  });

  const list = document.getElementById('record-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div>조건에 맞는 내역이 없습니다.</div>`;
    return;
  }

  filtered.sort((a, b) => { const o = {S:0,A:1,B:2,C:3}; return (o[a.priority]||9)-(o[b.priority]||9); });

  list.innerHTML = filtered.map(r => `
    <div class="record-card" id="card-${r.id}" onclick="toggleCard('${r.id}')">
      <div class="record-header">
        <span class="priority-${r.priority.toLowerCase()}">${r.priority}</span>
        <div>
          <div class="record-company">${r.company}</div>
          <div class="record-position">${r.position || ''}</div>
        </div>
        <div class="record-meta">
          <span class="stage-badge stage-${r.stage}">${r.stage}</span>
          <span style="font-size:11px;color:var(--muted)">${r.date || ''}</span>
        </div>
      </div>
      <div class="record-body" id="body-${r.id}">
        <div class="detail-row"><span class="detail-label">지원경로</span><span class="detail-value">${r.channel||'-'}</span></div>
        <div class="detail-row"><span class="detail-label">면접일</span><span class="detail-value">${r.interviewDate||'-'}</span></div>
        <div class="detail-row"><span class="detail-label">담당자</span><span class="detail-value">${r.contact||'-'}</span></div>
        ${r.memo ? `<div class="detail-row"><span class="detail-label">메모</span><span class="detail-value">${r.memo}</span></div>` : ''}
        ${r.resumeSaved ? `<div style="font-size:11px;color:var(--accent2);margin-top:6px">📄 이력서 결과 저장됨</div>` : ''}
        ${r.interviewSaved ? `<div style="font-size:11px;color:var(--orange);margin-top:4px">🎯 면접 준비 결과 저장됨</div>` : ''}

function saveModal() {
  const company = document.getElementById('m-company').value.trim();
  if (!company) { showToast('회사명 입력 필요'); return; }
  const data = {
    company,
    position: document.getElementById('m-position').value.trim(),
    stage: document.getElementById('m-stage').value,
    priority: document.getElementById('m-priority').value,
    channel: document.getElementById('m-channel').value,
    date: document.getElementById('m-date').value,
    interviewDate: document.getElementById('m-interview-date').value,
    contact: document.getElementById('m-contact').value.trim(),
    memo: document.getElementById('m-memo').value.trim(),
  };
  if (editingId) {
    const idx = records.findIndex(x => x.id === editingId);
    if (idx > -1) records[idx] = { ...records[idx], ...data };
  } else {
    records.unshift({ id: uid(), resumeSaved: false, interviewSaved: false, ...data });
  }
  saveRecords(); renderAll(); closeModal();
  showToast(editingId ? '✅ 수정됨' : '✅ 추가됨');
}

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  return data.content?.[0]?.text || '오류가 발생했습니다.';
}

// ── Notion 동기화 ──────────────────────────────────
const NOTION_DB_ID = '97d0f80d-33e5-48a9-bf66-6743a0c14b1f';
const NOTION_SYNC_KEY = 'notion_synced_ids';

async function syncToNotion() {
  const btn = document.getElementById('sync-btn');
  const status = document.getElementById('sync-status');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 동기화 중...';
  btn.style.color = 'var(--accent2)';
  status.textContent = '';

  // 이미 동기화된 ID 목록 로드
  let syncedIds = {};
  try {
    const r = await window.storage.get(NOTION_SYNC_KEY);
    if (r) syncedIds = JSON.parse(r.value);
  } catch {}

  let created = 0, updated = 0, failed = 0;

  for (const r of records) {
    try {
      const props = buildNotionProps(r);
      if (syncedIds[r.id]) {
        // 기존 페이지 업데이트
        await notionRequest('PATCH', `/pages/${syncedIds[r.id]}`, { properties: props });
        updated++;
      } else {
        // 신규 페이지 생성
        const res = await notionRequest('POST', '/pages', {
          parent: { database_id: NOTION_DB_ID },
          properties: props
        });
        if (res && res.id) {
          syncedIds[r.id] = res.id;
          created++;
        }
      }
    } catch(e) {
      console.error('sync error', r.company, e);
      failed++;
    }
  }

  // 동기화 ID 맵 저장
  await window.storage.set(NOTION_SYNC_KEY, JSON.stringify(syncedIds));
  await window.storage.set('notion_last_sync', new Date().toISOString());

  btn.disabled = false;
  btn.innerHTML = '🔄 Notion 동기화';
  btn.style.color = '';

  const msg = `신규 ${created}건 · 업데이트 ${updated}건${failed ? ` · 실패 ${failed}건` : ''}`;
  status.textContent = '✅ ' + msg;
  showToast('Notion 동기화 완료 — ' + msg);

  // 마지막 동기화 시각 표시
  setTimeout(() => {
    const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    status.textContent = `마지막 동기화 ${now}`;
  }, 3000);
}

function buildNotionProps(r) {
  const props = {
    '회사명': { title: [{ text: { content: r.company } }] },
  };
  if (r.position) props['포지션'] = { rich_text: [{ text: { content: r.position } }] };
  if (r.stage)    props['단계']   = { select: { name: r.stage } };
  if (r.priority) props['우선순위'] = { select: { name: r.priority } };
  if (r.channel)  props['지원경로'] = { select: { name: r.channel } };
  if (r.contact)  props['담당자']  = { rich_text: [{ text: { content: r.contact } }] };
  if (r.memo)     props['메모']    = { rich_text: [{ text: { content: r.memo } }] };
  if (r.date)     props['date:지원일:start'] = { date: { start: r.date } };
  if (r.interviewDate) props['date:면접일:start'] = { date: { start: r.interviewDate } };
  return props;
}

async function notionRequest(method, path, body) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion' }],
      messages: [{
        role: 'user',
        content: `Notion API 호출: ${method} ${path}\n요청 바디(JSON): ${JSON.stringify(body)}\n\n결과를 JSON만 반환해줘. 설명 없이.`
      }]
    })
  });
  const data = await res.json();
  const text = data.content?.map(c => c.text || '').join('') || '';
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch { return { raw: text }; }
}
